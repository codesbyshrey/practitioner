<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Card Matching Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Memory Card Matching Game</h1>
        </header>
        
        <div class="difficulty-selector">
            <label for="difficulty">Difficulty:</label>
            <select id="difficulty" class="difficulty-select">
                <option value="easy">Easy (4x4)</option>
                <option value="medium" selected>Medium (4x4)</option>
                <option value="hard">Hard (6x6)</option>
            </select>
        </div>
        
        <div class="game-info">
            <div class="info-item">
                <span class="label">Time:</span>
                <span id="timer">00:00</span>
            </div>
            <div class="info-item">
                <span class="label">Moves:</span>
                <span id="moves">0</span>
            </div>
            <div class="info-item">
                <span class="label">Score:</span>
                <span id="score">0</span>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <!-- Cards will be generated by JavaScript -->
        </div>

        <div class="controls">
            <button id="resetBtn" class="btn">New Game</button>
        </div>

        <div class="leaderboard-section">
            <h3>Top Scores</h3>
            <div id="leaderboard" class="leaderboard">
                <!-- Leaderboard entries will be generated by JavaScript -->
            </div>
        </div>

        <div id="gameOverModal" class="modal">
            <div class="modal-content">
                <h2>Congratulations!</h2>
                <p>You found all matches!</p>
                <div class="final-stats">
                    <p>Time: <span id="finalTime"></span></p>
                    <p>Moves: <span id="finalMoves"></span></p>
                    <p>Final Score: <span id="finalScore"></span></p>
                </div>
                <button id="playAgainBtn" class="btn">Play Again</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
